<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HA Analyzer{% endblock %} — HA Analyzer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
  <script src="{{ url_for('static', filename='js/htmx.min.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/alpine.min.js') }}" defer></script>
</head>
<body class="h-full" x-data>

  <nav class="bg-gray-900 text-white shadow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14">
        <div class="flex items-center gap-6">
          <a href="{{ url_for('main.index') }}" class="font-semibold text-lg tracking-tight">
            🏠 HA Analyzer
          </a>
          <a href="{{ url_for('scenarios.list_scenarios') }}"
             class="text-sm text-gray-300 hover:text-white {% if request.blueprint == 'scenarios' %}text-white font-medium{% endif %}">
            Scenarios
          </a>
          <a href="{{ url_for('analysis.list_results') }}"
             class="text-sm text-gray-300 hover:text-white {% if request.blueprint == 'analysis' %}text-white font-medium{% endif %}">
            Analysis
          </a>
        </div>
        <a href="http://192.168.0.107:3002" target="_blank"
           class="text-xs text-gray-400 hover:text-white">
          Grafana ↗
        </a>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="mb-4 rounded-md p-3 text-sm
          {% if category == 'success' %}bg-green-50 text-green-800 border border-green-200
          {% elif category == 'danger' %}bg-red-50 text-red-800 border border-red-200
          {% elif category == 'warning' %}bg-yellow-50 text-yellow-800 border border-yellow-200
          {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

</body>
</html>
